<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexTV — Películas y Series</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#06050f;
  --s1:#0d0b1a;
  --s2:#13112200;
  --border:rgba(168,85,247,.1);
  --border2:rgba(168,85,247,.25);
  --acc:#a855f7;
  --acc2:#7c3aed;
  --acc3:#c084fc;
  --red:#e50914;
  --text:#f0eeff;
  --muted:#7c6fa0;
  --muted2:#b0a0cc;
  --fd:'Bebas Neue',sans-serif;
  --fb:'Outfit',sans-serif;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;min-height:100vh}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:68px;padding:0 40px;
  display:flex;align-items:center;gap:0;justify-content:space-between;
  background:rgba(6,5,15,.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}

.logo{display:flex;align-items:center;cursor:pointer;text-decoration:none}
.logo img{height:68px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.2)}
.logo-fb{font-family:var(--fd);font-size:26px;letter-spacing:4px;background:linear-gradient(135deg,var(--acc3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:none}

nav{display:flex;align-items:center;gap:2px}
.nb{background:none;border:none;color:var(--muted2);font-family:var(--fb);font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:color .2s,background .2s}
.nb img{width:22px;height:22px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.1) saturate(1.5);opacity:.85}
.nb:hover{color:#fff;background:rgba(168,85,247,.12)}
.nb.active{color:var(--acc3);background:rgba(168,85,247,.15);border:1px solid var(--border2)}

.hdr-search{
  display:flex;align-items:center;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:30px;padding:0 6px 0 16px;
  transition:border-color .2s,background .2s;
}
.hdr-search:focus-within{border-color:var(--border2);background:rgba(168,85,247,.06)}
.hdr-search input{
  background:none;border:none;color:var(--text);
  font-family:var(--fb);font-size:13px;padding:8px 10px 8px 0;
  outline:none;width:200px;
}
.hdr-search input::placeholder{color:var(--muted)}
.hdr-search button{
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  border:none;border-radius:20px;padding:7px 16px;
  color:#fff;cursor:pointer;font-size:12px;font-weight:600;
  font-family:var(--fb);transition:opacity .2s;
}
.hdr-search button:hover{opacity:.88}

/* ── HERO HEADER ── */
.page-hero{
  margin-top:68px;padding:52px 44px 40px;
  background:linear-gradient(135deg,rgba(124,58,237,.18) 0%,rgba(6,5,15,.95) 60%);
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;top:-80px;right:-80px;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(168,85,247,.12),transparent 65%);
  pointer-events:none;
}
.page-hero-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:20px}
.page-hero h1{
  font-family:var(--fd);font-size:52px;letter-spacing:1.5px;line-height:1;
  display:flex;align-items:center;gap:14px;
}
.page-hero h1 img{width:44px;height:44px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.2) saturate(1.5)}
.page-hero h1 .g{background:linear-gradient(135deg,var(--acc3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.stats-row{display:flex;gap:24px;margin-top:18px}
.stat-pill{
  display:flex;align-items:center;gap:7px;
  font-size:11.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted2);padding:6px 14px;
  border:1px solid var(--border);border-radius:20px;
  background:rgba(168,85,247,.06);
}
.stat-pill span{color:var(--acc3);font-family:var(--fd);font-size:16px;letter-spacing:0}

/* tabs */
.tabs-row{display:flex;gap:10px;margin-top:28px}
.tab{
  background:rgba(0,0,0,.4);border:1px solid var(--border2);
  color:var(--muted2);padding:10px 26px;border-radius:30px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb);
  transition:all .25s;display:flex;align-items:center;gap:8px;
}
.tab:hover{background:rgba(168,85,247,.12);color:#fff}
.tab.active{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border-color:transparent;box-shadow:0 6px 24px rgba(124,58,237,.35)}

/* genre filters */
.genres-row{
  display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;
}
.genre-btn{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);padding:6px 16px;border-radius:20px;
  font-size:12px;cursor:pointer;font-family:var(--fb);font-weight:500;
  transition:all .2s;white-space:nowrap;
}
.genre-btn:hover{background:rgba(168,85,247,.1);color:var(--muted2);border-color:var(--border2)}
.genre-btn.active{background:rgba(168,85,247,.18);color:var(--acc3);border-color:var(--border2)}

/* ── SORT BAR ── */
.sort-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 44px;border-bottom:1px solid var(--border);
  background:rgba(6,5,15,.7);
}
.results-count{font-size:13px;color:var(--muted)}
.results-count strong{color:var(--acc3)}

.sort-group{display:flex;align-items:center;gap:8px}
.sort-label{font-size:12px;color:var(--muted);letter-spacing:.5px}
.sort-sel{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--muted2);padding:7px 14px;border-radius:8px;
  font-family:var(--fb);font-size:12.5px;cursor:pointer;outline:none;
  transition:border-color .2s;
}
.sort-sel:hover,.sort-sel:focus{border-color:var(--border2);color:var(--text)}

/* ── GRID ── */
.grid-wrap{padding:28px 44px 60px}

.media-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(168px,1fr));
  gap:20px;
}

.media-card{
  border-radius:12px;overflow:hidden;cursor:pointer;
  background:linear-gradient(180deg,#16122a,#0f0d1e);
  border:1px solid var(--border);
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;
  position:relative;
}
.media-card:hover{
  transform:scale(1.05) translateY(-6px);
  border-color:var(--acc);
  box-shadow:0 24px 56px rgba(0,0,0,.85),0 0 0 1.5px var(--acc);
  z-index:5;
}

.card-thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#0f0d1e;transition:transform .3s}
.media-card:hover .card-thumb{transform:scale(1.04)}

.card-play-btn{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.4);
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 30px rgba(124,58,237,.7);
}
.card-play-btn::after{content:'';border:7px solid transparent;border-left:13px solid #fff;margin-left:4px}
.media-card:hover .card-play-btn{opacity:1;transform:translate(-50%,-50%) scale(1)}

.card-rating{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.8);color:#facc15;font-size:10px;font-weight:700;
  padding:3px 7px;border-radius:5px;backdrop-filter:blur(4px);
  display:flex;align-items:center;gap:2px;
}
.card-new{
  position:absolute;top:8px;left:8px;
  background:var(--red);color:#fff;font-size:8.5px;font-weight:700;
  padding:2px 7px;border-radius:4px;letter-spacing:.8px;
}
.card-type-badge{
  position:absolute;top:8px;left:8px;
  background:rgba(124,58,237,.85);color:#fff;font-size:8.5px;font-weight:700;
  padding:2px 7px;border-radius:4px;letter-spacing:.8px;backdrop-filter:blur(4px);
}

.card-info{padding:10px 11px 12px}
.card-title{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.card-meta{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
.card-year{color:var(--acc3);font-weight:600}

/* ── SKELETON ── */
.skeleton-card{border-radius:12px;overflow:hidden;background:linear-gradient(180deg,#16122a,#0f0d1e);border:1px solid var(--border)}
.skel{background:linear-gradient(90deg,rgba(168,85,247,.05) 25%,rgba(168,85,247,.1) 50%,rgba(168,85,247,.05) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-poster{width:100%;aspect-ratio:2/3}
.skel-line{height:12px;border-radius:4px;margin:10px 11px 5px}
.skel-line.short{width:60%;height:10px;margin-top:0;margin-bottom:12px}

/* ── LOAD MORE ── */
.load-more-wrap{display:flex;justify-content:center;margin-top:36px}
.load-more{
  background:rgba(168,85,247,.1);border:1px solid var(--border2);
  color:var(--acc3);padding:12px 40px;border-radius:8px;
  font-family:var(--fb);font-size:13.5px;font-weight:600;cursor:pointer;
  transition:all .2s;
}
.load-more:hover{background:rgba(168,85,247,.2);color:#fff;box-shadow:0 8px 24px rgba(124,58,237,.2)}
.load-more:disabled{opacity:.4;cursor:not-allowed}

/* ── NO RESULTS ── */
.empty{
  text-align:center;padding:80px 20px;
  color:var(--muted);
}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:.5}
.empty h3{font-family:var(--fd);font-size:28px;letter-spacing:1px;margin-bottom:8px;color:var(--muted2)}
.empty p{font-size:14px;line-height:1.7}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.97);z-index:600;
  align-items:center;justify-content:center;
}
.overlay.open{display:flex}

.modal{
  background:linear-gradient(180deg,#1c1838,#0f0d1e);
  border-radius:20px;max-width:860px;width:94%;
  max-height:90vh;overflow-y:auto;
  border:1px solid var(--border2);
  box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 60px rgba(124,58,237,.1);
  position:relative;
}
.modal-x{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.08);border:none;color:var(--muted2);
  width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:5;
}
.modal-x:hover{background:rgba(255,255,255,.15);color:#fff}

.modal-inner{display:flex;flex-wrap:wrap;padding:32px;gap:28px}

.modal-poster-wrap{flex-shrink:0;position:relative}
.modal-poster{width:200px;border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.75)}
.modal-poster-badge{
  position:absolute;top:-10px;right:-10px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;
  box-shadow:0 4px 16px rgba(124,58,237,.4);
}

.modal-info{flex:1;min-width:240px}
.modal-title{font-family:var(--fd);font-size:34px;letter-spacing:.5px;line-height:1.05;margin-bottom:12px}
.modal-rating-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.imdb-badge{
  background:#f5c518;color:#000;font-size:11px;font-weight:800;
  padding:4px 10px;border-radius:5px;letter-spacing:.5px;display:flex;align-items:center;gap:4px;
}
.rt-score{font-size:13px;color:var(--muted2);font-weight:600}

.modal-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.tag{
  background:rgba(168,85,247,.1);border:1px solid var(--border2);
  color:var(--acc3);font-size:11px;font-weight:500;
  padding:4px 12px;border-radius:14px;
}

.modal-plot{color:rgba(240,238,255,.55);line-height:1.8;font-size:14px;margin-bottom:24px}

.modal-details-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.detail-item{}
.detail-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.detail-val{font-size:13px;color:var(--muted2);font-weight:500}

.modal-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary-modal{
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  border:none;color:#fff;padding:13px 32px;border-radius:9px;
  font-weight:600;font-size:14px;cursor:pointer;font-family:var(--fb);
  box-shadow:0 8px 28px rgba(124,58,237,.45);
  transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:8px;
}
.btn-primary-modal::before{content:'▶';font-size:12px}
.btn-primary-modal:hover{opacity:.88;transform:translateY(-1px)}

.btn-series-modal{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  color:var(--muted2);padding:13px 24px;border-radius:9px;
  font-weight:500;font-size:13.5px;cursor:pointer;font-family:var(--fb);
  transition:background .2s,color .2s;display:flex;align-items:center;gap:8px;
}
.btn-series-modal:hover{background:rgba(255,255,255,.14);color:#fff}

/* season/episode picker */
.ep-picker{display:none;margin-top:22px;padding-top:22px;border-top:1px solid var(--border)}
.ep-picker.show{display:block}
.ep-picker-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
.ep-row{display:flex;gap:8px;flex-wrap:wrap}
.ep-sel{
  background:rgba(168,85,247,.08);border:1px solid var(--border2);
  color:var(--muted2);padding:8px 18px;border-radius:7px;
  font-family:var(--fb);font-size:13px;cursor:pointer;outline:none;
}
.ep-sel:focus{border-color:var(--acc)}
.ep-play{
  background:var(--red);border:none;color:#fff;
  padding:8px 20px;border-radius:7px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:opacity .2s;
}
.ep-play:hover{opacity:.88}

/* ── PLAYER ── */
.player{
  display:none;position:fixed;
  top:0;left:0;right:0;bottom:0;z-index:700;
  background:#000;flex-direction:column;
}
.player.open{display:flex}
.player-bar{
  padding:10px 20px;background:#0d0b1a;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);flex-shrink:0;height:52px;
}
.player-title{color:var(--text);font-size:14px;font-weight:500}
.player-close{
  background:rgba(168,85,247,.15);border:1px solid var(--border2);
  color:var(--acc3);padding:6px 20px;border-radius:6px;cursor:pointer;
  font-size:12.5px;font-family:var(--fb);font-weight:600;transition:background .2s;
}
.player-close:hover{background:rgba(168,85,247,.28)}
.player-frame{width:100%;flex:1;border:none}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.grid-wrap{padding:24px 28px 50px}.sort-bar{padding:14px 28px}}
@media(max-width:768px){
  header{padding:0 16px;height:60px}
  .nb .lbl{display:none}.nb{padding:7px 10px}
  .page-hero{padding:36px 20px 30px}.page-hero h1{font-size:36px}
  .stats-row{gap:10px}
  .sort-bar{padding:12px 20px;flex-direction:column;align-items:flex-start;gap:10px}
  .grid-wrap{padding:18px 16px 44px}
  .media-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .modal-inner{flex-direction:column;align-items:center;text-align:center;padding:24px 20px}
  .modal-poster{width:155px}
  .modal-details-grid{grid-template-columns:1fr}
  .modal-actions{justify-content:center}
  .ep-row{justify-content:center}
  .hdr-search{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="index.html" onclick="return false">
    <img src="assets/images/logo.png" alt="DexTV" onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='block'">
    <div class="logo-fb">DEXTV</div>
  </a>
  <nav>
    <button class="nb" onclick="location.href='index.html'"><span class="lbl">Inicio</span></button>
    <button class="nb" onclick="location.href='anime.html'">
      <img src="assets/icons/anime1.png" alt="" onerror="this.style.display='none'">
      <span class="lbl">Anime</span>
    </button>
    <button class="nb" onclick="location.href='tv.html'">
      <img src="assets/icons/tv.png" alt="" onerror="this.style.display='none'">
      <span class="lbl">TV Directo</span>
    </button>
    <button class="nb active" onclick="location.href='peliculas.html'">
      <img src="assets/icons/pelicula.png" alt="" onerror="this.style.display='none'">
      <span class="lbl">Películas</span>
    </button>
  </nav>
  <div class="hdr-search">
    <input id="searchInput" placeholder="Buscar película o serie..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">Buscar</button>
  </div>
</header>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero-top">
    <div>
      <h1>
        <img src="assets/icons/pelicula.png" alt="" onerror="this.style.display='none'">
        PELÍCULAS <span class="g">&amp; SERIES</span>
      </h1>
      <div class="stats-row">
        <div class="stat-pill"><span>8K+</span> Títulos</div>
        <div class="stat-pill"><span>HD</span> Calidad</div>
        <div class="stat-pill"><span>∞</span> Gratis</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-row">
    <button class="tab active" data-type="movie" onclick="switchTab('movie',this)">🎬 Películas</button>
    <button class="tab" data-type="tv" onclick="switchTab('tv',this)">📺 Series</button>
  </div>

  <!-- GENRES -->
  <div class="genres-row" id="genresRow"></div>
</div>

<!-- SORT BAR -->
<div class="sort-bar">
  <div class="results-count" id="resultsCount">Mostrando <strong>—</strong> resultados</div>
  <div class="sort-group">
    <span class="sort-label">Ordenar:</span>
    <select class="sort-sel" id="sortSel" onchange="sortCards()">
      <option value="default">Por defecto</option>
      <option value="rating">Mayor rating</option>
      <option value="year-desc">Más recientes</option>
      <option value="year-asc">Más antiguos</option>
      <option value="alpha">A → Z</option>
    </select>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="media-grid" id="mediaGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="load-more" id="loadMoreBtn" onclick="loadMore()">Cargar más</button>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <div class="modal-poster-wrap">
        <img class="modal-poster" id="mPoster" alt="">
        <div class="modal-poster-badge" id="mBadge">PELÍCULA</div>
      </div>
      <div class="modal-info">
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-rating-row">
          <div class="imdb-badge">IMDb <span id="mRating">—</span></div>
          <span class="rt-score" id="mGenre"></span>
          <span class="rt-score" id="mRuntime"></span>
        </div>
        <div class="modal-tags" id="mTags"></div>
        <div class="modal-plot" id="mPlot"></div>
        <div class="modal-details-grid">
          <div class="detail-item"><div class="detail-label">Año</div><div class="detail-val" id="mYear">—</div></div>
          <div class="detail-item"><div class="detail-label">Director</div><div class="detail-val" id="mDir">—</div></div>
          <div class="detail-item"><div class="detail-label">País</div><div class="detail-val" id="mCountry">—</div></div>
          <div class="detail-item"><div class="detail-label">Idioma</div><div class="detail-val" id="mLang">—</div></div>
        </div>
        <div class="modal-actions">
          <button class="btn-primary-modal" id="mPlayBtn">Reproducir</button>
          <button class="btn-series-modal" id="mEpBtn" style="display:none" onclick="toggleEpPicker()">📋 Temporadas</button>
        </div>

const GENRES_MOVIE = ['Todos','Acción','Comedia','Terror','Ciencia Ficción','Drama','Thriller','Animación','Romance'];
const GENRES_TV    = ['Todos','Acción','Drama','Comedia','Fantasía','Sci-Fi','Misterio','Crime'];

let currentType = 'movie';
let currentGenre = 'Todos';
let currentSort  = 'default';
let currentSearch = '';
let allItems = [];
let page = 0;
const PER_PAGE = 12;

/* ── INIT ── */
buildGenres(GENRES_MOVIE);
switchTab('movie', document.querySelector('.tab.active'));

function switchTab(type, el) {
  currentType  = type;
  currentGenre = 'Todos';
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(el) el.classList.add('active');
  buildGenres(type === 'movie' ? GENRES_MOVIE : GENRES_TV);
  resetGrid();
}

function buildGenres(list) {
  const row = document.getElementById('genresRow');
  row.innerHTML = list.map(g =>
    `<button class="genre-btn${g==='Todos'?' active':''}" onclick="selectGenre('${g}',this)">${g}</button>`
  ).join('');
}

function selectGenre(g, el) {
  currentGenre = g;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  resetGrid();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  currentGenre = 'Todos';
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.toggle('active', b.textContent==='Todos'));
  resetGrid();
}

function sortCards() {
  currentSort = document.getElementById('sortSel').value;
  resetGrid();
}

function getFiltered() {
  let src = currentType === 'movie' ? MOVIES : SERIES;
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    src = src.filter(m => m.t.toLowerCase().includes(q));
  }
  return src;
}

function getSorted(arr) {
  const a = [...arr];
  switch(currentSort) {
    case 'rating':    return a.sort((x,y) => y.r - x.r);
    case 'year-desc': return a.sort((x,y) => y.y - x.y);
    case 'year-asc':  return a.sort((x,y) => x.y - y.y);
    case 'alpha':     return a.sort((x,y) => x.t.localeCompare(y.t));
    default:          return a;
  }
}

function resetGrid() {
  page = 0;
  allItems = getSorted(getFiltered());
  document.getElementById('mediaGrid').innerHTML = '';
  renderPage();
  updateCount();
}

function renderPage() {
  const grid = document.getElementById('mediaGrid');
  const chunk = allItems.slice(page * PER_PAGE, (page+1)*PER_PAGE);
  if (page === 0 && chunk.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="empty">
      <div class="empty-icon">🎬</div>
      <h3>SIN RESULTADOS</h3>
      <p>No encontramos nada para "${currentSearch}".<br>Prueba con otro término.</p>
    </div>`;
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }
  chunk.forEach(m => {
    const el = document.createElement('div');
    el.className = 'media-card';
    el.innerHTML = `
      <img class="card-thumb" src="${m.p}" alt="${m.t}" loading="lazy"
           onerror="this.src='https://placehold.co/300x450/16122a/a855f7?text=${encodeURIComponent(m.t.charAt(0))}'">
      <div class="card-play-btn"></div>
      ${m.isNew ? '<div class="card-new">NUEVO</div>' : ''}
      ${!m.isNew ? `<div class="card-rating">★ ${m.r}</div>` : `<div class="card-rating">★ ${m.r}</div>`}
      <div class="card-info">
        <div class="card-title">${m.t}</div>
        <div class="card-meta"><span class="card-year">${m.y}</span></div>
      </div>`;
    el.addEventListener('click', () => openModal(m));
    grid.appendChild(el);
  });
  page++;
  const hasMore = page * PER_PAGE < allItems.length;
  document.getElementById('loadMoreWrap').style.display = hasMore ? 'flex' : 'none';
}

function loadMore() { renderPage() }

function updateCount() {
  document.getElementById('resultsCount').innerHTML =
    `Mostrando <strong>${Math.min(page*PER_PAGE,allItems.length)} de ${allItems.length}</strong> resultados`;
}

/* ── MODAL ── */
let currentModalItem = null;

async function openModal(m) {
  currentModalItem = m;
  const ov = document.getElementById('overlay');
  document.getElementById('mTitle').textContent = m.t;
  document.getElementById('mPoster').src = m.p;
  document.getElementById('mPoster').onerror = function(){ this.src=`https://placehold.co/200x300/16122a/a855f7?text=${m.t.charAt(0)}`};
  document.getElementById('mRating').textContent = m.r + '/10';
  document.getElementById('mBadge').textContent  = currentType === 'tv' ? 'SERIE' : 'PELÍCULA';
  document.getElementById('mYear').textContent   = m.y;
  document.getElementById('mGenre').textContent  = '';
  document.getElementById('mRuntime').textContent= '';
  document.getElementById('mPlot').textContent   = 'Cargando información...';
  document.getElementById('mTags').innerHTML     = '';
  document.getElementById('mDir').textContent    = '—';
  document.getElementById('mCountry').textContent= '—';
  document.getElementById('mLang').textContent   = '—';
  document.getElementById('mPlayBtn').onclick    = () => { closeModal(); openPlayer(m.id, m.t, currentType); };

  // series episode picker
  const epBtn = document.getElementById('mEpBtn');
  const epPick = document.getElementById('epPicker');
  epPick.classList.remove('show');
  if (currentType === 'tv') {
    epBtn.style.display = 'flex';
    buildEpPicker(m.s || 1, m.e || 1, m.id, m.t);
  } else {
    epBtn.style.display = 'none';
  }

  ov.classList.add('open');

  try {
    const res = await fetch(`${OMDB}?apikey=${KEY}&i=${m.id}&plot=full`);
    const d   = await res.json();
    if (d.Response === 'False') return;
    document.getElementById('mTitle').textContent   = d.Title || m.t;
    document.getElementById('mPoster').src          = d.Poster !== 'N/A' ? d.Poster : m.p;
    document.getElementById('mRating').textContent  = (d.imdbRating||m.r) + '/10';
    document.getElementById('mGenre').textContent   = d.Genre || '';
    document.getElementById('mRuntime').textContent = d.Runtime || '';
    document.getElementById('mPlot').textContent    = d.Plot || 'Sin sinopsis.';
    document.getElementById('mDir').textContent     = d.Director || d.Writer || '—';
    document.getElementById('mCountry').textContent = d.Country || '—';
    document.getElementById('mLang').textContent    = d.Language || '—';
    document.getElementById('mYear').textContent    = d.Year || m.y;
    // genre tags
    const tags = (d.Genre || '').split(',').map(g=>g.trim()).filter(Boolean);
    document.getElementById('mTags').innerHTML = tags.map(g=>`<span class="tag">${g}</span>`).join('');
    document.getElementById('mPlayBtn').onclick = () => { closeModal(); openPlayer(m.id, d.Title||m.t, currentType); };
  } catch {}
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('epPicker').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal() });

/* ep picker */
function buildEpPicker(maxS, maxE, id, title) {
  const sSel = document.getElementById('selSeason');
  const eSel = document.getElementById('selEp');
  sSel.innerHTML = Array.from({length:maxS},(_,i)=>`<option value="${i+1}">Temporada ${i+1}</option>`).join('');
  eSel.innerHTML = Array.from({length:Math.min(maxE,24)},(_,i)=>`<option value="${i+1}">Episodio ${i+1}</option>`).join('');
  document.getElementById('epPlayBtn').onclick = () => {
    const s = sSel.value, e = eSel.value;
    closeModal();
    openPlayer(id, `${title} T${s}E${e}`, 'tv', s, e);
  };
}

function toggleEpPicker() {
  document.getElementById('epPicker').classList.toggle('show');
}

/* ── PLAYER ── */
function openPlayer(id, title, type, s=1, e=1) {
  const url = type==='movie'
    ? `${VS}/embed/movie/${id}`
    : `${VS}/embed/tv/${id}/${s}/${e}`;
  document.getElementById('playerTitle').textContent = '▶ ' + title;
  document.getElementById('playerFrame').src = url;
  document.getElementById('playerEl').classList.add('open');
}

function closePlayer() {
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerEl').classList.remove('open');
}
</script>
