<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexTV - Reproduciendo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161f;
  --border: rgba(255,255,255,0.07);
  --accent: #e50914;
  --purple: #a855f7;
  --text: #f0f0f0;
  --muted: #666;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Outfit', sans-serif;
}
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); min-height: 100vh;
}

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.logo {
  font-family: var(--font-display); font-size: 24px;
  letter-spacing: 3px; color: var(--accent); cursor: pointer;
  text-shadow: 0 0 20px rgba(229,9,20,0.4);
}
.logo span { color: #fff; }
.back-btn {
  display: flex; align-items: center; gap: 8px;
  color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  transition: color 0.2s; padding: 6px 12px;
  border: 1px solid var(--border); border-radius: 6px;
}
.back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.back-btn::before { content: '←'; font-size: 16px; }

/* LAYOUT */
.wrap {
  max-width: 1280px; margin: 0 auto;
  padding: 80px 24px 40px;
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto auto auto;
  gap: 20px;
}

/* TITLE ROW */
.title-row {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 16px;
}
.anime-title {
  font-family: var(--font-display);
  font-size: 32px; letter-spacing: 1px;
  line-height: 1;
}
.anime-title span { color: var(--accent); }

/* VIDEO */
.video-col { display: flex; flex-direction: column; gap: 16px; }
.video-wrapper {
  position: relative; width: 100%;
  padding-bottom: 56.25%;
  background: #000; border-radius: 12px; overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
}
.video-wrapper iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}
.player-loader {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000; gap: 14px;
  color: var(--muted); font-size: 14px;
}
.spinner {
  width: 38px; height: 38px;
  border: 3px solid rgba(229,9,20,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* CONTROLS PANEL */
.controls-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}

/* LANG */
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px;
}
.lang-selector { display: flex; gap: 8px; }
.lang-btn {
  flex: 1; padding: 8px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); font-family: var(--font-body);
  font-size: 12px; font-weight: 500; transition: all 0.2s;
  text-align: center;
}
.lang-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.lang-btn.active {
  background: rgba(168,85,247,0.15);
  border-color: var(--purple); color: var(--purple);
}

/* SERVERS */
.server-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.server-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); background: var(--card);
  color: var(--muted); font-family: var(--font-body);
  font-size: 12px; font-weight: 500; transition: all 0.2s;
}
.server-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.server-btn.active {
  background: rgba(229,9,20,0.12);
  border-color: var(--accent); color: var(--text);
}
.server-btn .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
}
.server-btn.active .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

/* EPISODES SIDEBAR */
.episodes-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column;
  max-height: calc(56.25vw * 0.78 + 180px);
}
.episodes-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.episodes-header h3 {
  font-family: var(--font-display); font-size: 16px; letter-spacing: 1px;
}
.ep-count {
  font-size: 11px; color: var(--muted);
  background: var(--card); padding: 2px 8px; border-radius: 10px;
}
.episodes-list {
  overflow-y: auto; flex: 1; padding: 12px;
  display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.episodes-list::-webkit-scrollbar { width: 4px; }
.episodes-list::-webkit-scrollbar-track { background: transparent; }
.episodes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.ep-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  border: none; background: transparent; color: var(--muted);
  font-family: var(--font-body); font-size: 13px;
  text-align: left; transition: all 0.18s; width: 100%;
}
.ep-btn:hover { background: var(--card); color: var(--text); }
.ep-btn.active {
  background: rgba(229,9,20,0.1);
  color: var(--text); border-left: 2px solid var(--accent);
}
.ep-num {
  font-family: var(--font-display); font-size: 18px;
  color: var(--accent); line-height: 1; min-width: 28px;
}
.ep-btn.active .ep-num { color: var(--accent); }
.ep-label { font-size: 12px; line-height: 1.3; }

/* EMPTY / ERROR */
.state-msg {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px; color: var(--muted);
  text-align: center; gap: 12px; font-size: 14px;
}
.retry-btn {
  padding: 8px 20px; background: var(--accent);
  border: none; border-radius: 6px; color: #fff;
  font-family: var(--font-body); font-size: 13px;
  cursor: pointer; transition: opacity 0.2s;
}
.retry-btn:hover { opacity: 0.85; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .wrap {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    padding: 72px 16px 32px;
    gap: 16px;
  }
  .episodes-col { max-height: 360px; }
  .anime-title { font-size: 24px; }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.href='anime.html'">DEX<span>TV</span></div>
  <a href="anime.html" class="back-btn">Volver al catálogo</a>
</header>

<div class="wrap">

  <!-- TITLE -->
  <div class="title-row">
    <div class="anime-title" id="animeTitle">Cargando<span>...</span></div>
  </div>

  <!-- VIDEO + CONTROLS -->
  <div class="video-col">
    <div class="video-wrapper">
      <div class="player-loader" id="playerLoader">
        <div class="spinner"></div>
        <span>Cargando reproductor...</span>
      </div>
      <iframe id="playerFrame" allowfullscreen style="display:none"></iframe>
    </div>

    <!-- CONTROLS -->
    <div class="controls-panel" id="controlsPanel" style="display:none">
      <!-- IDIOMA -->
      <div id="langSection">
        <div class="section-label">Idioma</div>
        <div class="lang-selector">
          <button class="lang-btn active" data-lang="sub">🇯🇵 Subtítulos</button>
          <button class="lang-btn" data-lang="dub">🇪🇸 Doblado</button>
        </div>
      </div>
      <!-- SERVIDORES -->
      <div id="serverSection">
        <div class="section-label">Servidor</div>
        <div class="server-grid" id="serverList"></div>
      </div>
    </div>
  </div>

  <!-- EPISODIOS -->
  <div class="episodes-col">
    <div class="episodes-header">
      <h3>EPISODIOS</h3>
      <span class="ep-count" id="epCount">—</span>
    </div>
    <div class="episodes-list" id="episodesList">
      <div class="state-msg"><div class="spinner"></div>Buscando episodios...</div>
    </div>
  </div>

</div>

<script type="module">
import { CONFIG } from './js/config.js';

const params     = new URLSearchParams(window.location.search);
const animeUrl   = params.get('url');
const animeTitle = params.get('title');

const titleEl       = document.getElementById('animeTitle');
const playerFrame   = document.getElementById('playerFrame');
const playerLoader  = document.getElementById('playerLoader');
const episodesList  = document.getElementById('episodesList');
const epCount       = document.getElementById('epCount');
const serverList    = document.getElementById('serverList');
const controlsPanel = document.getElementById('controlsPanel');

let episodes       = [];
let currentServers = {};
let currentLang    = 'sub';

if (animeTitle) {
  const t = decodeURIComponent(animeTitle);
  titleEl.innerHTML = t.replace(/(\s)(\S+)$/, '$1<span>$2</span>');
}

// ── Embed URL helpers ──────────────────────
function getEmbedUrl(url) {
  if (!url) return null;
  if (url.includes('yourupload.com'))  return `https://www.yourupload.com/embed/${url.split('/').pop()}`;
  if (url.includes('streamtape.com')) return `https://streamtape.com/e/${url.split('/').pop()}`;
  if (url.includes('doodstream.com') || url.includes('dood.ws')) return `https://doodstream.com/e/${url.split('/').pop()}`;
  if (url.includes('mixdrop.co'))     return `https://mixdrop.co/e/${url.split('/').pop()}`;
  if (url.includes('mega.nz'))        return url.replace('/file/', '/embed/');
  if (url.includes('mp4upload.com'))  return `https://www.mp4upload.com/embed-${url.split('/').pop()}.html`;
  return url;
}

// ── Load anime info ────────────────────────
async function loadAnimeInfo() {
  if (!animeUrl) {
    episodesList.innerHTML = '<div class="state-msg">❌ No se especificó anime</div>';
    return;
  }

  for (const api of CONFIG.APIS) {
    try {
      const res = await fetch(`${api.baseUrl}/info?url=${encodeURIComponent(animeUrl)}`, {
        headers: { [api.authHeader]: api.apiKey }
      });
      if (!res.ok) continue;
      const data = await res.json();
      const eps = data?.data?.episodes || data?.episodes || [];
      if (eps.length > 0) {
        episodes = eps;
        renderEpisodes();
        loadEpisode(eps[0], 0);
        return;
      }
    } catch (_) {}
  }

  episodesList.innerHTML = `
    <div class="state-msg">
      ⚠️ No se encontraron episodios
      <button class="retry-btn" onclick="location.reload()">Reintentar</button>
    </div>`;
  setLoader('❌ Sin episodios disponibles', false);
}

// ── Render episode list ────────────────────
function renderEpisodes() {
  epCount.textContent = `${episodes.length} eps`;
  episodesList.innerHTML = episodes.map((ep, i) => `
    <button class="ep-btn ${i === 0 ? 'active' : ''}" data-index="${i}">
      <span class="ep-num">${ep.number || ep.ep || i + 1}</span>
      <span class="ep-label">Episodio ${ep.number || ep.ep || i + 1}</span>
    </button>
  `).join('');

  episodesList.querySelectorAll('.ep-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      episodesList.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadEpisode(episodes[+btn.dataset.index], +btn.dataset.index);
    });
  });
}

// ── Load episode servers ───────────────────
async function loadEpisode(ep, idx) {
  const epUrl = ep?.url || ep?.episodeUrl;
  if (!epUrl) return;

  setLoader('Buscando servidores...', true);
  playerFrame.style.display = 'none';
  controlsPanel.style.display = 'none';

  for (const api of CONFIG.APIS) {
    try {
      const res = await fetch(`${api.baseUrl}/episode?url=${encodeURIComponent(epUrl)}&includeMega=true`, {
        headers: { [api.authHeader]: api.apiKey }
      });
      if (!res.ok) continue;
      const data = await res.json();
      const servers = data?.data?.servers || data?.data?.streamLinks || {};
      if (Object.keys(servers).length > 0) {
        currentServers = servers;
        controlsPanel.style.display = 'flex';
        renderServers();
        return;
      }
    } catch (_) {}
  }

  setLoader('❌ No hay servidores disponibles', false);
}

// ── Render server buttons ──────────────────
function renderServers() {
  const key = currentLang === 'sub' ? 'sub' : 'dub';
  const list = currentServers[key] || currentServers[key.toUpperCase()] || [];

  if (list.length === 0) {
    serverList.innerHTML = '<span style="color:var(--muted);font-size:13px">Sin servidores para este idioma</span>';
    setLoader('Sin servidores disponibles', false);
    return;
  }

  serverList.innerHTML = list.map((srv, i) => `
    <button class="server-btn ${i === 0 ? 'active' : ''}" data-url="${srv.url}" data-i="${i}">
      <span class="dot"></span>${srv.server}
    </button>
  `).join('');

  serverList.querySelectorAll('.server-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      serverList.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      playUrl(btn.dataset.url);
    });
  });

  if (list[0]) playUrl(list[0].url);
}

// ── Play a URL ─────────────────────────────
function playUrl(url) {
  const embed = getEmbedUrl(url);
  if (!embed) return;
  setLoader('Cargando video...', true);
  playerFrame.style.display = 'none';
  setTimeout(() => {
    playerFrame.src = embed;
    playerFrame.style.display = 'block';
    playerLoader.style.display = 'none';
  }, 400);
}

function setLoader(msg, spinning) {
  playerLoader.style.display = 'flex';
  playerLoader.innerHTML = spinning
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<span style="color:var(--muted)">${msg}</span>`;
}

// ── Lang buttons ───────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    renderServers();
  });
});

loadAnimeInfo();
</script>
</body>
</html>
