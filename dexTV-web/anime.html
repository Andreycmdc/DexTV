<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DexTV вҖ” Anime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* в”Җв”Җ RESET & TOKENS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06050f;--surface:#0d0b1a;--card:#13112a;
  --border:rgba(168,85,247,.10);--border2:rgba(168,85,247,.28);
  --acc:#a855f7;--acc2:#7c3aed;--acc3:#c084fc;
  --gold:#facc15;--green:#4ade80;
  --text:#f0eeff;--muted:#7c6fa0;--muted2:#b0a0cc;
  --fd:'Bebas Neue',sans-serif;--fb:'Outfit',sans-serif;
  --hh:64px;--px:clamp(16px,4vw,48px);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}

/* в”Җв”Җ HEADER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
header{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:var(--hh);padding:0 var(--px);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:linear-gradient(to bottom,rgba(6,5,15,.97) 60%,transparent);
  backdrop-filter:blur(14px);transition:background .35s,box-shadow .35s;
}
header.solid{background:rgba(6,5,15,.98);box-shadow:0 1px 0 var(--border)}
.logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0;cursor:pointer}
.logo img{height:var(--hh);object-fit:contain;mix-blend-mode:screen;filter:brightness(1.2) saturate(1.1)}
.logo-text{font-family:var(--fd);font-size:26px;letter-spacing:4px;background:linear-gradient(135deg,var(--acc3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:none}
nav{display:flex;align-items:center;gap:2px;flex:1;justify-content:center}
.nb{background:none;border:none;color:var(--muted2);font-family:var(--fb);font-size:13px;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:color .2s,background .2s;white-space:nowrap}
.nb img{width:20px;height:20px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.1) saturate(1.5);opacity:.85}
.nb:hover{color:#fff;background:rgba(168,85,247,.12)}
.nb.active{color:var(--acc3);background:rgba(168,85,247,.15);border:1px solid var(--border2)}
.search-wrap{position:relative;display:flex;align-items:center;flex-shrink:0}
.search-wrap input{background:rgba(168,85,247,.07);border:1px solid var(--border);color:var(--text);font-family:var(--fb);font-size:13px;padding:8px 38px 8px 14px;border-radius:8px;width:clamp(130px,18vw,240px);outline:none;transition:all .3s}
.search-wrap input:focus{width:clamp(155px,23vw,300px);background:rgba(168,85,247,.12);border-color:var(--border2)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;right:11px;color:var(--muted);font-size:17px;cursor:pointer;transition:color .2s;line-height:1}
.search-icon:hover{color:var(--acc)}

/* в”Җв”Җ HERO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.hero{position:relative;height:clamp(320px,50vw,510px);display:flex;align-items:flex-end;overflow:hidden;margin-top:var(--hh)}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0d0720 0%,#06050f 65%)}
.hero-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 60% at 75% 40%,rgba(168,85,247,.15) 0%,transparent 70%),radial-gradient(ellipse 35% 50% at 15% 65%,rgba(124,58,237,.10) 0%,transparent 70%)}
.hero-cards{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:clamp(16px,5vw,60px);gap:clamp(8px,1.2vw,14px);pointer-events:none}
.hero-card-img{height:clamp(170px,27vw,330px);width:clamp(110px,17vw,215px);border-radius:10px;object-fit:cover;opacity:0;transform:translateY(20px);animation:hci .6s ease forwards;box-shadow:0 24px 60px rgba(0,0,0,.85),0 0 0 1px rgba(168,85,247,.15);flex-shrink:0}
.hero-card-img:nth-child(1){animation-delay:.10s;margin-top:10%}
.hero-card-img:nth-child(2){animation-delay:.20s;margin-top:-6%}
.hero-card-img:nth-child(3){animation-delay:.30s;margin-top:5%}
.hero-card-img:nth-child(4){animation-delay:.40s;margin-top:-11%}
@keyframes hci{to{opacity:1;transform:translateY(0)}}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to right,rgba(6,5,15,1) 0%,rgba(6,5,15,.88) 38%,rgba(6,5,15,.15) 68%,transparent 100%),linear-gradient(to top,rgba(6,5,15,1) 0%,transparent 44%)}
.hero-content{position:relative;z-index:2;padding:0 var(--px) clamp(28px,5vw,52px);max-width:560px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--acc3);border:1px solid rgba(168,85,247,.3);padding:5px 13px;border-radius:20px;background:rgba(168,85,247,.10);margin-bottom:12px}
.hero-badge .dot{width:6px;height:6px;background:var(--acc);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%{box-shadow:0 0 0 0 rgba(168,85,247,.6)}70%{box-shadow:0 0 0 7px rgba(168,85,247,0)}}
.hero-title{font-family:var(--fd);font-size:clamp(40px,6.5vw,74px);line-height:.92;letter-spacing:2px;margin-bottom:10px}
.hero-title .g{background:linear-gradient(135deg,var(--acc3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-desc{color:rgba(240,238,255,.50);font-size:clamp(12px,1.4vw,14px);line-height:1.7;margin-bottom:20px;max-width:370px}
.hero-stats{display:flex;gap:clamp(14px,3vw,30px)}
.stat .num{font-family:var(--fd);font-size:clamp(22px,2.8vw,32px);background:linear-gradient(135deg,var(--acc3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.hero-dots{position:absolute;bottom:18px;right:var(--px);z-index:10;display:flex;gap:8px}
.hdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:all .3s;border:none;padding:0}
.hdot.active{background:var(--acc);width:20px;border-radius:3px}

/* в”Җв”Җ CATEGORY BAR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.cat-bar{display:flex;gap:8px;padding:14px var(--px) 12px;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--hh);z-index:200;background:linear-gradient(to bottom,rgba(6,5,15,.98),rgba(6,5,15,.93));backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:rgba(168,85,247,.06);border:1px solid var(--border);color:var(--muted2);font-family:var(--fb);font-size:12.5px;font-weight:500;padding:6px 15px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-btn:hover{color:var(--text);border-color:var(--border2);background:rgba(168,85,247,.12)}
.cat-btn.active{background:linear-gradient(135deg,var(--acc2),var(--acc));border-color:var(--acc);color:#fff;box-shadow:0 4px 18px rgba(124,58,237,.4)}

/* в”Җв”Җ SECTION HEAD в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:22px var(--px) 12px}
.section-title{font-family:var(--fd);font-size:22px;letter-spacing:1px}
.section-title .g{background:linear-gradient(135deg,var(--acc3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.results-count{font-size:11px;color:var(--muted);flex-shrink:0}

/* в”Җв”Җ GRID в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(120px,13.5vw,162px),1fr));gap:clamp(10px,1.3vw,15px);padding:0 var(--px) 60px}

/* в”Җв”Җ CARD в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.anime-card{
  position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
  background:var(--card);aspect-ratio:2/3;border:1px solid var(--border);
  opacity:0;animation:fadeUp .4s ease forwards;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;
}
.anime-card:hover{transform:scale(1.07) translateY(-5px);box-shadow:0 24px 56px rgba(0,0,0,.9),0 0 0 1.5px var(--acc);border-color:var(--acc);z-index:10}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.anime-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.anime-card:hover img{transform:scale(1.06)}

/* Score badge вҖ” siempre visible */
.card-score{
  position:absolute;top:8px;left:8px;
  display:flex;align-items:center;gap:3px;
  background:rgba(0,0,0,.82);
  border:1px solid rgba(250,204,21,.25);
  backdrop-filter:blur(6px);
  font-size:10px;font-weight:700;
  padding:3px 7px;border-radius:5px;
  color:var(--gold);
  z-index:2;
}
.card-score .star{font-size:9px}

/* Tipo badge вҖ” esquina superior derecha */
.card-type{
  position:absolute;top:8px;right:8px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  color:#fff;font-size:8px;font-weight:700;
  padding:2px 6px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.5px;
  z-index:2;
}

/* Play button */
.card-play{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.4);
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 30px rgba(124,58,237,.8);
}
.card-play::after{content:'';border:6px solid transparent;border-left:11px solid #fff;margin-left:3px}
.anime-card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* Overlay con info */
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(6,5,15,.98) 0%,rgba(6,5,15,.65) 45%,rgba(6,5,15,.10) 75%,transparent 100%);
  opacity:0;transition:opacity .28s;
  display:flex;flex-direction:column;justify-content:flex-end;padding:11px;
}
.anime-card:hover .card-overlay{opacity:1}

.card-title{font-size:11.5px;font-weight:700;line-height:1.3;margin-bottom:5px;color:#fff}

/* GГ©neros */
.card-genres{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.card-genre-tag{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.3);color:var(--acc3);font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:3px;letter-spacing:.3px}

/* Metadata line */
.card-meta{font-size:10px;color:var(--muted2);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.card-meta .sep{color:var(--muted);font-size:8px}

/* Synopsis al hover */
.card-synopsis{
  font-size:9.5px;color:rgba(176,160,204,.75);line-height:1.45;
  margin-top:5px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}

/* в”Җв”Җ SKELETON в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.skeleton-card{background:var(--card);border-radius:10px;aspect-ratio:2/3;border:1px solid var(--border);position:relative;overflow:hidden}
.skeleton-card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(168,85,247,.05) 50%,transparent 100%);animation:shimmer 1.6s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* в”Җв”Җ LOAD MORE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.load-more-wrap{text-align:center;padding:8px var(--px) 60px}
.load-more-btn{background:transparent;border:1px solid var(--border2);color:var(--acc3);font-family:var(--fb);font-size:13px;font-weight:600;padding:12px 44px;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.load-more-btn:hover{background:rgba(168,85,247,.12);border-color:var(--acc);box-shadow:0 0 24px rgba(124,58,237,.2)}

/* в”Җв”Җ EMPTY / ERROR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);font-size:15px}

/* в”Җв”Җ SEARCH INDICATOR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.searching-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;color:var(--acc3);
  background:rgba(168,85,247,.08);border:1px solid var(--border2);
  padding:4px 12px;border-radius:20px;margin-left:10px;
  vertical-align:middle;
}
.searching-badge .spin{
  width:10px;height:10px;border:1.5px solid rgba(168,85,247,.3);
  border-top-color:var(--acc);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* в”Җв”Җ PROGRESS BAR (carga inicial) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.progress-bar{position:fixed;top:var(--hh);left:0;right:0;height:2px;z-index:400;background:rgba(168,85,247,.15)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc3));width:0%;transition:width .4s ease;border-radius:0 2px 2px 0}

/* в”Җв”Җ TOAST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.toast{position:fixed;bottom:24px;left:50%;z-index:999;transform:translateX(-50%) translateY(14px);background:rgba(13,11,26,.95);border:1px solid var(--border2);color:var(--muted2);font-size:12px;font-family:var(--fb);padding:8px 18px;border-radius:20px;backdrop-filter:blur(10px);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* в”Җв”Җ RESPONSIVE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
@media(max-width:640px){
  nav{display:none}
  .hero-cards{display:none}
}
@media(min-width:641px) and (max-width:900px){
  .nb .nb-lbl{display:none}
  .nb{padding:7px 10px}
}
@media(prefers-reduced-motion:reduce){
  .anime-card,.hero-card-img,.card-play{transition:none;animation:none;opacity:1;transform:none}
  @keyframes shimmer{from{}to{}}
}
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- HEADER -->
<header id="mainHeader">
  <a class="logo" href="index.html" aria-label="DexTV inicio">
    <img src="assets/images/logo.png" alt="DexTV"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="logo-text">DEXTV</div>
  </a>
  <nav aria-label="Secciones">
    <button class="nb" onclick="location.href='index.html'"><span class="nb-lbl">Inicio</span></button>
    <button class="nb active" aria-current="page">
      <img src="assets/icons/anime1.png" alt="" onerror="this.style.display='none'">
      <span class="nb-lbl">Anime</span>
    </button>
    <button class="nb" onclick="location.href='tv.html'">
      <img src="assets/icons/tv.png" alt="" onerror="this.style.display='none'">
      <span class="nb-lbl">TV Directo</span>
    </button>
    <button class="nb" onclick="location.href='peliculas.html'">
      <img src="assets/icons/pelicula.png" alt="" onerror="this.style.display='none'">
      <span class="nb-lbl">PelГӯculas</span>
    </button>
  </nav>
  <div class="search-wrap" role="search">
    <input type="search" id="searchInput" placeholder="Buscar animeвҖҰ"
           autocomplete="off" aria-label="Buscar anime">
    <span class="search-icon" id="searchBtn" role="button" tabindex="0">вҢ•</span>
  </div>
</header>

<!-- HERO -->
<section class="hero" aria-label="Destacados">
  <div class="hero-bg">
    <div class="hero-cards" id="heroCards" aria-hidden="true"></div>
    <div class="hero-gradient"></div>
  </div>
  <div class="hero-content">
    <div class="hero-badge"><span class="dot" aria-hidden="true"></span><span id="heroLabel">CATГҒLOGO COMPLETO</span></div>
    <h1 class="hero-title" id="heroTitle">ANIME <span class="g">PARA</span><br>TODOS</h1>
    <p class="hero-desc" id="heroDesc">Miles de tГӯtulos en un solo lugar. Desde clГЎsicos hasta los Гәltimos estrenos.</p>
    <div class="hero-stats">

<script type="module">
// в”Җв”Җ IMPORT вҖ” se agrega searchQuery que faltaba в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
import { searchAnime, searchByCategory, searchQuery, buildAnime1vUrl, clearCache } from './js/api.js';

/* в”Җв”Җ utils в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const $ = id => document.getElementById(id);
const esc = s => !s ? '' : String(s)
  .replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg, ms=2800) {
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),ms);
}

function setProgress(pct) {
  $('progressFill').style.width = pct+'%';
  if (pct>=100) setTimeout(()=>{ $('progressFill').style.width='0%'; },600);
}

/* Genera estrellas llenas/medias/vacГӯas segГәn score (0вҖ“10) */
function starsHtml(score) {
  if (!score) return '';
  const s = parseFloat(score);
  const stars5 = s / 2;
  let html = '';
  for (let i=1; i<=5; i++) {
    if (stars5 >= i)           html += '<span style="color:var(--gold)">вҳ…</span>';
    else if (stars5 >= i-0.5)  html += '<span style="color:var(--gold);opacity:.6">вҳ…</span>';
    else                       html += '<span style="color:rgba(250,204,21,.2)">вҳ…</span>';
  }
  return html;
}

/* Color del score */
function scoreColor(score) {
  if (!score) return 'var(--muted2)';
  const s = parseFloat(score);
  if (s >= 8.0) return 'var(--green)';
  if (s >= 7.0) return 'var(--gold)';
  return '#f87171';
}

/* Placeholder cuando no hay imagen */
function placeholderUrl(title) {
  return `https://placehold.co/300x450/13112a/a855f7?text=${encodeURIComponent((title||'??').substring(0,2).toUpperCase())}`;
}

/* в”Җв”Җ estado в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const ITEMS_PAGE = 36;
let allAnimes=[], filteredAnimes=[], currentPage=1;
let searchTimer=null, searchAbort=null;
let heroSlides=[], heroIdx=0, heroTimer=null;
let isSearching=false;

/* в”Җв”Җ DOM refs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const grid=$('animeGrid'), loadMoreBtn=$('loadMoreBtn');
const resultsCount=$('resultsCount'), sectionTitle=$('sectionTitle');
const searchInput=$('searchInput'), statTotal=$('statTotal');
const heroCards=$('heroCards'), heroDots=$('heroDots');
const heroLabel=$('heroLabel'), heroTitleEl=$('heroTitle'), heroDescEl=$('heroDesc');
const header=$('mainHeader');

window.addEventListener('scroll',()=>header.classList.toggle('solid',scrollY>60),{passive:true});

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   INIT
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function init() {
  setupListeners();
  showSkeletons(12);
  setProgress(15);
  try {
    setProgress(40);

    // Callback que actualiza imГЎgenes en el DOM sin re-renderizar todo
    function onImagesReady(updatedCatalog) {
      allAnimes = updatedCatalog;
      updatedCatalog.forEach(anime => {
        if (!anime.picture) return;
        const card = grid.querySelector(
          `.anime-card[data-title="${CSS.escape(anime.title||'')}"]`
        );
        if (!card) return;
        const img = card.querySelector('img');
        if (img && (img.src.includes('placehold.co') || img.naturalWidth === 0)) {
          img.src = anime.picture;
        }
      });
    }

    const animes = await searchAnime('anime', onImagesReady);
    setProgress(90);
    allAnimes = animes;
    filteredAnimes = animes;
    statTotal.textContent = allAnimes.length+'+';
    buildHero(allAnimes);
    renderGrid();
    setProgress(100);
  } catch(err) {
    console.error(err);
    showEmpty('Error al cargar. Recarga la pГЎgina.');
    setProgress(100);
  }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   HERO
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const SLIDE_META=[
  {label:'рҹ”Ҙ TRENDING',   title:'LO MEJOR <span class="g">DEL MOMENTO</span>',      desc:'Los animes mГЎs vistos de la temporada.'},
  {label:'вӯҗ TOP RATED',  title:'LOS MГҒS <span class="g">VALORADOS</span>',          desc:'Los favoritos de millones de fans en todo el mundo.'},
  {label:'вҡ”пёҸ ACCIГ“N',    title:'BATALLAS <span class="g">ГүPICAS</span>',             desc:'Peleas, poder y momentos inolvidables.'},
  {label:'рҹҢҢ FANTASГҚA',   title:'MUNDOS <span class="g">SIN LГҚMITES</span>',         desc:'Isekai, magia y aventuras Гәnicas.'},
  {label:'рҹ’• ROMANCE',    title:'HISTORIAS <span class="g">DE AMOR</span>',          desc:'Sentimientos que llegarГЎn a tu corazГіn.'},
];
const FALLBACK_IMGS=[
  'https://cdn.myanimelist.net/images/anime/1000/110531l.jpg',
  'https://cdn.myanimelist.net/images/anime/1286/99889l.jpg',
  'https://cdn.myanimelist.net/images/anime/1171/109222l.jpg',
  'https://cdn.myanimelist.net/images/anime/9/9453l.jpg',
];

function buildHero(animes) {
  const imgs=animes.filter(a=>a.picture&&!a.picture.includes('placehold')).slice(0,20).map(a=>a.picture);
  heroSlides=SLIDE_META.map((meta,i)=>{
    const chunk=imgs.slice(i*4,i*4+4);
    while(chunk.length<4) chunk.push(FALLBACK_IMGS[chunk.length%4]);
    return {...meta, images:chunk};
  });
  renderHeroSlide(0); buildHeroDots(); startHeroTimer();
}

function renderHeroSlide(idx) {
  const s=heroSlides[idx]; if(!s) return;
  heroIdx=idx;
  heroLabel.textContent=s.label;
  heroTitleEl.innerHTML=s.title;
  heroDescEl.textContent=s.desc;
  heroCards.innerHTML=s.images.map(src=>
    `<img class="hero-card-img" src="${esc(src)}" alt="" loading="lazy" onerror="this.style.display='none'">`
  ).join('');
  document.querySelectorAll('.hdot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function buildHeroDots() {
  heroDots.innerHTML=heroSlides.map((_,i)=>
    `<button class="hdot ${i===0?'active':''}" data-i="${i}" aria-label="Slide ${i+1}"></button>`
  ).join('');
  heroDots.querySelectorAll('.hdot').forEach(d=>d.addEventListener('click',()=>{
    stopHeroTimer(); renderHeroSlide(+d.dataset.i); startHeroTimer();
  }));
}
function startHeroTimer(){stopHeroTimer();heroTimer=setInterval(()=>renderHeroSlide((heroIdx+1)%heroSlides.length),6000)}
function stopHeroTimer(){clearInterval(heroTimer);heroTimer=null}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   RENDER GRID
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderGrid() {
  const end=currentPage*ITEMS_PAGE;
  const list=filteredAnimes.slice(0,end);

  if(list.length===0){ showEmpty('рҹҺҢ No se encontraron animes'); return; }

  grid.innerHTML=list.map((anime,i)=>{
    const url=buildAnime1vUrl(anime.title);
    const sc=anime.score ? parseFloat(anime.score).toFixed(1) : null;
    const pic=anime.picture || placeholderUrl(anime.title);
    const genres=(anime.genres||[]).slice(0,2);
    const genresHtml=genres.map(g=>`<span class="card-genre-tag">${esc(g)}</span>`).join('');
    const synop=anime.synopsis
      ? anime.synopsis.replace(/<[^>]+>/g,'').substring(0,120)+(anime.synopsis.length>120?'вҖҰ':'')
      : '';

    return `
    <article class="anime-card" role="listitem"
      data-url="${esc(url)}" data-title="${esc(anime.title)}"
      tabindex="0" style="animation-delay:${(i%ITEMS_PAGE)*12}ms"
      aria-label="${esc(anime.title)}">

      ${sc ? `
      <div class="card-score">
        <span class="star">вҳ…</span>
        <span style="color:${scoreColor(sc)}">${sc}</span>
      </div>` : ''}

      ${anime.type ? `<div class="card-type">${esc(anime.type)}</div>` : ''}

      <img src="${esc(pic)}"
           data-src="${esc(anime.picture||'')}"
           alt="${esc(anime.title)}"
           loading="lazy" decoding="async"
           onerror="this.src='${placeholderUrl(anime.title)}'">

      <div class="card-play" aria-hidden="true"></div>

      <div class="card-overlay">
        <div class="card-title">${esc(anime.title)}</div>
        ${genresHtml ? `<div class="card-genres">${genresHtml}</div>` : ''}
        <div class="card-meta">
          ${sc ? `<span style="display:flex;align-items:center;gap:2px;font-size:9.5px">${starsHtml(sc)}</span><span class="sep">В·</span>` : ''}
          ${anime.year ? `<span>${anime.year}</span>` : ''}
          ${anime.episodes&&anime.episodes!=='?' ? `<span class="sep">В·</span><span>${anime.episodes} ep</span>` : ''}
        </div>
        ${synop ? `<div class="card-synopsis">${esc(synop)}</div>` : ''}
      </div>
    </article>`;
  }).join('');

  grid.querySelectorAll('.anime-card').forEach(card=>{
    const go=()=>location.href=`player.html?url=${encodeURIComponent(card.dataset.url)}&title=${encodeURIComponent(card.dataset.title)}`;
    card.addEventListener('click',go);
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')go()});
  });

  resultsCount.textContent=`${list.length} de ${filteredAnimes.length} animes`;
  loadMoreBtn.style.display=filteredAnimes.length>end?'block':'none';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BГҡSQUEDA вҖ” 100% funcional
   1. Muestra resultados locales instantГЎneamente
   2. Consulta searchQuery (local + Jikan fallback)
   3. Cancela bГәsquedas anteriores si el usuario sigue escribiendo
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function doSearch() {
  const q = searchInput.value.trim();
  currentPage = 1;

  // Sin query вҶ’ restaurar catГЎlogo completo
  if (!q) {
    filteredAnimes = allAnimes;
    sectionTitle.innerHTML = 'CATГҒLOGO <span class="g">COMPLETO</span>';
    renderGrid();
    return;
  }

  // Token de cancelaciГіn para esta bГәsqueda
  const token = Symbol();
  searchAbort = token;

  sectionTitle.innerHTML = `RESULTADOS <span class="g">"${esc(q)}"</span>`;

  // в”Җв”Җ Paso 1: filtro local INSTANTГҒNEO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const qLow = q.toLowerCase();
  const local = allAnimes.filter(a =>
    (a.title    || '').toLowerCase().includes(qLow) ||
    (a.genres   || []).some(g => g.toLowerCase().includes(qLow)) ||
    (a.synopsis || '').toLowerCase().includes(qLow)
  );

  filteredAnimes = local;

  if (local.length > 0) {
    renderGrid();
    // Mostrar indicador de bГәsqueda externa en curso
    resultsCount.innerHTML =
      `${local.length} locales
       <span class="searching-badge">
         <span class="spin"></span> buscando mГЎsвҖҰ
       </span>`;
  } else {
    showSkeletons(12);
  }

  // в”Җв”Җ Paso 2: searchQuery вҶ’ local refinado + Jikan API в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  try {
    const results = await searchQuery(q, allAnimes);

    // Si el usuario escribiГі algo nuevo mientras esperГЎbamos, ignorar
    if (searchAbort !== token) return;

    if (results && results.length > 0) {
      filteredAnimes = results;
      renderGrid();
      // Toast si Jikan trajo resultados extra
      if (results.length > local.length) {
        toast(`вңЁ ${results.length} resultados encontrados`);
      }
    } else if (local.length === 0) {
      showEmpty(`рҹ”Қ Sin resultados para "${esc(q)}"`);
    } else {
      // Solo actualizar el contador sin el badge de "buscando"
      renderGrid();
    }
  } catch (err) {
    if (searchAbort !== token) return;
    console.warn('searchQuery error:', err);
    if (local.length === 0) {
      showEmpty(`рҹ”Қ Sin resultados para "${esc(q)}"`);
    } else {
      renderGrid(); // Mantener los resultados locales
    }
  }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   CATEGORГҚAS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const CAT_LABELS={
  all:      'CATГҒLOGO <span class="g">COMPLETO</span>',
  popular:  'LO MГҒS <span class="g">POPULAR</span>',
  new:      'ГҡLTIMOS <span class="g">ESTRENOS</span>',
  action:   'ANIME DE <span class="g">ACCIГ“N</span>',
  adventure:'AVENTURA <span class="g">ГүPICA</span>',
  romance:  'AMOR Y <span class="g">ROMANCE</span>',
  comedy:   'COMEDIA <span class="g">PURA</span>',
  fantasy:  'MUNDOS <span class="g">FANTГҒSTICOS</span>',
  horror:   'TERROR Y <span class="g">HORROR</span>',
  drama:    'DRAMA <span class="g">INTENSO</span>',
  scifi:    'CIENCIA <span class="g">FICCIГ“N</span>',
  sports:   'ANIME DE <span class="g">DEPORTES</span>',
  mecha:    'ROBOTS Y <span class="g">MECHA</span>',
};

async function loadCategory(cat) {
  currentPage=1;
  // Limpiar bГәsqueda activa al cambiar categorГӯa
  searchAbort = Symbol();
  searchInput.value = '';
  sectionTitle.innerHTML=CAT_LABELS[cat]||CAT_LABELS.all;
  if (cat==='all') { filteredAnimes=allAnimes; renderGrid(); return; }
  showSkeletons(12);
  filteredAnimes=await searchByCategory(cat, allAnimes);
  if (filteredAnimes.length===0) showEmpty('Sin animes en esta categorГӯa aГәn');
  else renderGrid();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   HELPERS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function showSkeletons(n=12) {
  grid.innerHTML=Array(n).fill('<div class="skeleton-card" aria-hidden="true"></div>').join('');
  loadMoreBtn.style.display='none'; resultsCount.textContent='';
}
function showEmpty(msg) {
  grid.innerHTML=`<div class="empty" role="alert">${msg}</div>`;
  loadMoreBtn.style.display='none'; resultsCount.textContent='';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   LISTENERS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function setupListeners() {
  // BotГіn buscar y Enter
  $('searchBtn').addEventListener('click', doSearch);
  $('searchBtn').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
  searchInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ clearTimeout(searchTimer); doSearch(); } });

  // Input con debounce de 320ms
  searchInput.addEventListener('input', ()=>{
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (!q) {
      // Restaurar catГЎlogo inmediatamente si se borra el campo
      searchAbort = Symbol();
      filteredAnimes = allAnimes;
      currentPage = 1;
      sectionTitle.innerHTML = 'CATГҒLOGO <span class="g">COMPLETO</span>';
      renderGrid();
      return;
    }
    searchTimer = setTimeout(doSearch, 320);
  });

  // CategorГӯas
  $('catBar').addEventListener('click', e=>{
    const btn=e.target.closest('.cat-btn'); if(!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    loadCategory(btn.dataset.cat);
  });

  // Load more
  loadMoreBtn.addEventListener('click', ()=>{
    currentPage++; renderGrid();
    loadMoreBtn.scrollIntoView({behavior:'smooth', block:'center'});
  });

  // Ctrl+Shift+C вҶ’ limpiar cachГ©
  document.addEventListener('keydown', e=>{
    if (e.ctrlKey && e.shiftKey && e.key==='C') {
      clearCache();
      toast('рҹ—‘пёҸ CachГ© limpiado вҖ” recargandoвҖҰ');
    }
  });
}

init();
</script>
</body>
</html>
